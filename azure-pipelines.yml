trigger: 
  - main
  - feature/*

pool:
  name: taskify_pool

stages:
  - stage: Build
    displayName: buildstage
    jobs:
      - job: TerraformInittoPlan
        displayName: "terraform Init to plan"
        steps:
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/env/dev'
            backendServiceArm: 'Taskify-SC'
            backendAzureRmResourceGroupName: 'rg-pip'
            backendAzureRmStorageAccountName: 'strpipeline123'
            backendAzureRmContainerName: 'containerpipeline'
            backendAzureRmKey: 'keystatefile1'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'validate'
            workingDirectory: '$(System.DefaultWorkingDirectory)/env/dev'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(System.DefaultWorkingDirectory)/env/dev'
            outputTo: 'console'
            customCommand: 'fmt'
            environmentServiceNameAzureRM: 'Taskify-SC'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(System.DefaultWorkingDirectory)/env/dev'
            environmentServiceNameAzureRM: 'Taskify-SC'