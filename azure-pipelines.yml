trigger: none

parameters:
- name: branchName
  displayName: Select Branch
  type: string
  default: main

- name: terraformCommand
  displayName: Select Terraform Command
  type: string
  default: init
  values:
    - init
    - fmt
    - validate
    - plan
    - apply

pool:
  name: $(pool)

variables:
- group: New variable group 22-Apr

- name: WorkDir
  value: '$(System.DefaultWorkingDirectory)/env/dev'

stages:

# ===============================
# BUILD STAGE
# ===============================
- stage: Build
  displayName: Build Stage

  jobs:
  - job: TerraformWorkflow
    displayName: Terraform Init to Plan

    steps:
    - checkout: self
      clean: true

    # ===============================
    # INIT
    # Runs only when INIT selected
    # ===============================
    - task: TerraformTask@5
      displayName: Terraform Init
      condition: eq('${{ parameters.terraformCommand }}', 'init')
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(WorkDir)'
        backendServiceArm: 'Taskify-SC'
        backendAzureRmResourceGroupName: 'rg-pip'
        backendAzureRmStorageAccountName: 'strpipeline123'
        backendAzureRmContainerName: 'containerpipeline'
        backendAzureRmKey: 'keystatefile1'

    # ===============================
    # FMT
    # Runs when INIT or FMT selected
    # ===============================
    - task: TerraformTask@5
      displayName: Terraform FMT
      condition: or(
                  eq('${{ parameters.terraformCommand }}','init'),
                  eq('${{ parameters.terraformCommand }}','fmt')
                )
      inputs:
        provider: 'azurerm'
        command: 'custom'
        workingDirectory: '$(WorkDir)'
        customCommand: 'fmt'
        outputTo: 'console'
        environmentServiceNameAzureRM: 'Taskify-SC'

    # ===============================
    # VALIDATE
    # Runs when INIT / FMT / VALIDATE selected
    # ===============================
    - task: TerraformTask@5
      displayName: Terraform Validate
      condition: or(
                  eq('${{ parameters.terraformCommand }}','init'),
                  eq('${{ parameters.terraformCommand }}','fmt'),
                  eq('${{ parameters.terraformCommand }}','validate')
                )
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(WorkDir)'

    # ===============================
    # PLAN
    # Runs when INIT / FMT / VALIDATE / PLAN selected
    # ===============================
    - task: TerraformTask@5
      displayName: Terraform Plan
      condition: or(
                  eq('${{ parameters.terraformCommand }}','init'),
                  eq('${{ parameters.terraformCommand }}','fmt'),
                  eq('${{ parameters.terraformCommand }}','validate'),
                  eq('${{ parameters.terraformCommand }}','plan')
                )
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(WorkDir)'
        environmentServiceNameAzureRM: 'Taskify-SC'


# ===============================
# DEPLOY STAGE
# ===============================
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Build

  jobs:
  - job: TerraformApply
    displayName: Terraform Apply
    condition: eq('${{ parameters.terraformCommand }}', 'apply')

    pool:
      name: $(pool)

    steps:
    - checkout: self
      clean: true

    # INIT before APPLY
    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(WorkDir)'
        backendServiceArm: 'Taskify-SC'
        backendAzureRmResourceGroupName: 'rg-pip'
        backendAzureRmStorageAccountName: 'strpipeline123'
        backendAzureRmContainerName: 'containerpipeline'
        backendAzureRmKey: 'keystatefile1'

    # APPLY
    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(WorkDir)'
        commandOptions: '-auto-approve'
        environmentServiceNameAzureRM: 'Taskify-SC'